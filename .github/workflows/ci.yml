name: SentiVerse CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"
        
    - name: Install dependencies
      working-directory: ./backend
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest httpx
        
    - name: Run Pytest Suite
      working-directory: ./backend
      # Prevent tests from crashing due to missing mock env keys
      env:
        OPENAI_API_KEY: "mock_key_for_ci"
        TMDB_API_KEY: "mock_key_for_ci"
      run: |
        pytest tests/

  build-frontend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Use Node.js 18
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        
    - name: Install Frontend Deps and Build
      working-directory: ./frontend
      run: |
        npm ci
        # Set dummy env var so Next.js static build doesn't fail
        NEXT_PUBLIC_API_URL=http://localhost:8000 npm run build

  docker-verify:
    needs: [test-backend, build-frontend]
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Verify Backend Container Build
      run: docker build -t sentiverse-backend:test ./backend